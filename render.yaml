services:
  - type: web
    name: nigeria-zerodose-api
    env: python
    region: oregon
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
    autoDeploy: true
